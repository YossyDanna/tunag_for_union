<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>準備中 | TUNAG for UNION</title>
  <meta name="description" content="このページは現在準備中です。TUNAG for UNION - 労働組合の運営課題を解決するSaaS×伴走支援サービス。">
  <meta property="og:title" content="準備中 | TUNAG for UNION">
  <meta property="og:description" content="このページは現在準備中です。">
  <meta property="og:type" content="website">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="common_file/TUNAG_for_UNION_logo.png">
  <link rel="apple-touch-icon" href="common_file/TUNAG_for_UNION_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Shippori+Mincho+B1:wght@500;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #107bff;
      --primary-dark: #283e59;
      --primary-light: #7dc4ff;
      --accent: #f44646;
      --accent-hover: #d93636;
      --text-main: #283e59;
      --text-sub: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text-main);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(135deg, #3A6FE0 0%, #4A82F4 50%, #5A90F8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Background decorations */
    body::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -25%;
      left: -8%;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ===== LOGO (top-left) ===== */
    .page-header {
      padding: 28px 40px;
      position: relative;
      z-index: 2;
    }
    .page-header a {
      display: inline-flex;
      align-items: center;
      background: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }
    .page-header a:hover {
      transform: translateY(-1px);
    }
    .page-header img {
      height: 34px;
      width: auto;
      display: block;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      color: #fff;
    }

    /* Icon */
    .icon-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      position: relative;
    }
    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.25);
      animation: spin 20s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .icon {
      font-size: 52px;
      line-height: 1;
    }

    .label {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .title {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .title span {
      color: var(--primary-light);
    }
    .message {
      font-size: 16px;
      opacity: 0.9;
      line-height: 2;
      margin-bottom: 40px;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 1.5px solid var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(244,70,70,0.3);
    }
    .btn-outline {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
    }

    /* ===== FOOTER ===== */
    .page-footer {
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      position: relative;
      z-index: 2;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .page-header { padding: 20px 24px; }
      .page-header a { padding: 8px 14px; border-radius: 8px; }
      .page-header img { height: 26px; }

      .main { padding: 20px 20px 60px; }
      .icon-wrap { width: 96px; height: 96px; margin-bottom: 24px; }
      .icon { font-size: 42px; }

      .label { font-size: 11px; padding: 5px 14px; }
      .title { font-size: 30px; letter-spacing: 1px; margin-bottom: 16px; }
      .message { font-size: 14px; line-height: 1.9; margin-bottom: 32px; }

      .actions { flex-direction: column; width: 100%; }
      .btn {
        width: 100%;
        justify-content: center;
        padding: 14px 20px;
      }
    }
    /* ===== ENHANCED TYPOGRAPHY ===== */
    .label {
      font-family: 'Outfit', sans-serif;
    }

    /* ===== GRAIN TEXTURE ===== */
    body > *:not(.page-header):not(.main):not(.page-footer) {
      position: relative;
    }
    body {
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"),
        linear-gradient(135deg, #3A6FE0 0%, #4A82F4 50%, #5A90F8 100%);
      background-blend-mode: overlay;
      background-size: 180px, 100%;
    }

    /* ===== CTA PULSE ===== */
    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244, 70, 70, 0.45); }
      70% { box-shadow: 0 0 0 14px rgba(244, 70, 70, 0); }
    }
    .btn-primary {
      animation: ctaPulse 2.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .btn-primary:hover {
      animation: none;
    }

    /* ===== ENTRANCE ANIMATION ===== */
    .card > * {
      opacity: 0;
      transform: translateY(20px);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .card .icon-wrap { animation-delay: 0.1s; }
    .card .label { animation-delay: 0.2s; }
    .card .title { animation-delay: 0.35s; }
    .card .message { animation-delay: 0.5s; }
    .card .actions { animation-delay: 0.65s; }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== ICON GLOW ===== */
    .icon-wrap {
      box-shadow: 0 0 40px rgba(125, 196, 255, 0.15);
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* ===== FLOATING PARTICLES ===== */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="page-header">
    <a href="#">
      <img src="common_file/TUNAG_for_UNION_fulllogo.png" alt="TUNAG for UNION">
    </a>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="card">
      <div class="icon-wrap">
        <div class="icon">🔧</div>
      </div>
      <div class="label">UNDER CONSTRUCTION</div>
      <h1 class="title">このページは<br><span>準備中</span>です</h1>
      <p class="message">
        現在、より良いサービスをお届けするため<br>
        鋭意準備を進めております。<br>
        もうしばらくお待ちください。
      </p>
      <div class="actions">
        <a href="javascript:history.back()" class="btn btn-outline">← 前のページに戻る</a>
        <a href="message.html" class="btn btn-primary">お問い合わせはこちら →</a>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="page-footer">
    &copy; 2026 Stamen, Inc. All rights reserved.
  </footer>
<script>
  // Generate floating particles
  const body = document.body;
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.width = particle.style.height = (Math.random() * 3 + 2) + 'px';
    particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
    particle.style.animationDelay = (Math.random() * 10) + 's';
    body.appendChild(particle);
  }
</script>
</body>
</html>
