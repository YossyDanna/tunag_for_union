<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | TUNAG for UNION</title>
  <meta name="description" content="お問い合わせありがとうございます。担当者より2営業日以内にご連絡いたします。">
  <meta property="og:title" content="送信完了 | TUNAG for UNION">
  <meta property="og:description" content="お問い合わせありがとうございます。">
  <meta property="og:type" content="website">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="common_file/TUNAG_for_UNION_logo.png">
  <link rel="apple-touch-icon" href="common_file/TUNAG_for_UNION_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Shippori+Mincho+B1:wght@500;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #107bff;
      --primary-dark: #283e59;
      --primary-light: #7dc4ff;
      --accent: #f44646;
      --text-main: #283e59;
      --text-sub: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text-main);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(135deg, #3A6FE0 0%, #4A82F4 50%, #5A90F8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -25%;
      left: -8%;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      pointer-events: none;
    }

    .page-header {
      padding: 28px 40px;
      position: relative;
      z-index: 2;
    }
    .page-header a {
      display: inline-flex;
      align-items: center;
      background: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      text-decoration: none;
    }
    .page-header a:hover {
      transform: translateY(-1px);
    }
    .page-header img {
      height: 34px;
      width: auto;
      display: block;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }
    .card {
      max-width: 600px;
      width: 100%;
      text-align: center;
      color: #fff;
    }

    .icon-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      position: relative;
      box-shadow: 0 0 40px rgba(255,255,255,0.1);
    }
    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.25);
      animation: spin 20s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .icon {
      font-size: 52px;
      line-height: 1;
    }

    .label {
      display: inline-block;
      font-family: 'Outfit', sans-serif;
      background: rgba(255,255,255,0.18);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .title {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .message {
      font-size: 16px;
      opacity: 0.92;
      line-height: 2;
      margin-bottom: 16px;
    }
    .message-note {
      font-size: 14px;
      opacity: 0.75;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-white {
      background: #fff;
      color: var(--primary-dark);
      border: 1.5px solid #fff;
    }
    .btn-white:hover {
      background: #f0f4f8;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .btn-outline {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
    }

    .page-footer {
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      position: relative;
      z-index: 2;
    }

    /* ===== ENTRANCE ANIMATION ===== */
    .card > * {
      opacity: 0;
      transform: translateY(20px);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .card .icon-wrap { animation-delay: 0.1s; }
    .card .label { animation-delay: 0.2s; }
    .card .title { animation-delay: 0.35s; }
    .card .message { animation-delay: 0.5s; }
    .card .message-note { animation-delay: 0.6s; }
    .card .actions { animation-delay: 0.7s; }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== CHECKMARK ANIMATION ===== */
    @keyframes checkPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .icon {
      animation: checkPop 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .page-header { padding: 20px 24px; }
      .page-header a { padding: 8px 14px; border-radius: 8px; }
      .page-header img { height: 26px; }

      .main { padding: 20px 20px 60px; }
      .icon-wrap { width: 96px; height: 96px; margin-bottom: 24px; }
      .icon { font-size: 42px; }

      .label { font-size: 11px; padding: 5px 14px; }
      .title { font-size: 28px; letter-spacing: 1px; margin-bottom: 16px; }
      .message { font-size: 14px; line-height: 1.9; }
      .message-note { font-size: 13px; margin-bottom: 32px; }

      .actions { flex-direction: column; width: 100%; }
      .btn {
        width: 100%;
        justify-content: center;
        padding: 14px 20px;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="message.html">
      <img src="common_file/TUNAG_for_UNION_fulllogo.png" alt="TUNAG for UNION">
    </a>
  </header>

  <main class="main">
    <div class="card">
      <div class="icon-wrap">
        <div class="icon">✓</div>
      </div>
      <div class="label">THANK YOU</div>
      <h1 class="title">送信が完了しました</h1>
      <p class="message">
        お問い合わせいただき、ありがとうございます。<br>
        担当者より<strong>2営業日以内</strong>にご連絡差し上げます。
      </p>
      <p class="message-note">
        しばらく経っても連絡がない場合は、<br>
        お手数ですが再度お問い合わせください。
      </p>
      <div class="actions">
        <a href="message.html" class="btn btn-white">← トップに戻る</a>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    &copy; 2026 Stamen, Inc. All rights reserved.
  </footer>
</body>
</html>
